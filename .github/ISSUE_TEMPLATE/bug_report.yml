name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do not include UniFi credentials, API keys, tokens, or private controller details.

        If your bug involves one of the MCP servers (Network / Protect / Access), the controller fields below are critical for reproduction — please fill them in even if they feel redundant.

        If this is a security vulnerability, do not open a public issue. Use GitHub Security Advisories instead: https://github.com/sirkirby/unifi-mcp/security/advisories
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am using the latest released version, or I confirmed the issue still exists on `main`.
          required: true
        - label: I have removed credentials, tokens, API keys, IP addresses, and other private data from the report.
          required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Network MCP server
        - Protect MCP server
        - Access MCP server
        - Relay sidecar
        - Cloudflare Worker / CLI
        - API server
        - Claude/Codex plugin packaging
        - Documentation
        - Unsure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version, git SHA, Docker image tag, or plugin version.
      placeholder: "unifi-network-mcp 0.0.0, main@abcdef0, or ghcr.io/..."
    validations:
      required: true
  - type: dropdown
    id: controller_host
    attributes:
      label: Controller hardware / host
      description: Where the UniFi controller runs. Required for MCP server bugs.
      options:
        - UDM Pro
        - UDM Pro Max
        - UDM SE
        - UDM (base)
        - UDR / UDR7
        - UCG Max / UCG Ultra / UCG Fiber
        - Cloud Key Gen2 / Gen2+
        - Self-hosted (Linux)
        - Self-hosted (Docker)
        - UniFi-hosted (Site Manager / Cloud Console)
        - Other
        - N/A — not an MCP server bug
    validations:
      required: true
  - type: input
    id: unifi_os
    attributes:
      label: UniFi OS version
      description: Settings → System on the controller UI. Required for MCP server bugs.
      placeholder: "e.g. 4.0.21"
  - type: input
    id: network_app
    attributes:
      label: Network application version
      description: Required if reporting a Network MCP bug. Settings → System → Updates → "Network".
      placeholder: "e.g. 9.0.108"
  - type: input
    id: protect_app
    attributes:
      label: Protect application version
      description: Required if reporting a Protect MCP bug.
      placeholder: "e.g. 5.1.66"
  - type: input
    id: access_app
    attributes:
      label: Access application version
      description: Required if reporting an Access MCP bug.
      placeholder: "e.g. 1.27.5"
  - type: input
    id: site_setup
    attributes:
      label: Site setup
      description: Multi-site, recently restored from backup, mid-firmware-upgrade, unusual DPI/IDS config, etc.
      placeholder: "Single site, default config"
  - type: input
    id: install_method
    attributes:
      label: Install method
      placeholder: "uvx, pip, Docker image tag, plugin marketplace, source"
    validations:
      required: true
  - type: input
    id: client_os
    attributes:
      label: OS where the MCP client runs
      placeholder: "macOS 15.1, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: input
    id: mcp_client
    attributes:
      label: MCP client
      description: The host running the MCP server (Claude Code, Claude Desktop, Codex, custom, etc.).
      placeholder: "Claude Code 1.x, Claude Desktop, Codex CLI"
    validations:
      required: true
  - type: input
    id: ai_model
    attributes:
      label: AI model used
      description: Optional — which model invoked the MCP tools. Useful for behavioral/agent issues.
      placeholder: "Claude Opus 4.7, Sonnet 4.6, GPT-5, etc."
  - type: textarea
    id: prompt
    attributes:
      label: Exact prompt
      description: Optional — the verbatim prompt that triggered the unexpected behavior. Strongly recommended for agent/tool-selection issues.
  - type: textarea
    id: tool_calls
    attributes:
      label: Tool calls observed
      description: Optional — which `unifi_*` tools the agent invoked, with arguments. Copy from the agent's tool-call output.
      render: shell
  - type: textarea
    id: raw_tool_output
    attributes:
      label: Raw tool output (sanitized)
      description: Paste the raw response from the relevant tool call. Scrub MACs/IPs/SSIDs/hostnames before posting.
      render: json
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction you can.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste sanitized logs, tracebacks, or command output.
      render: shell
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, suspected cause, or anything else useful.
    validations:
      required: false
  - type: checkboxes
    id: conduct
    attributes:
      label: Code of conduct
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
